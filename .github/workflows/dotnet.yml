# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:

    strategy:
      matrix:
        configuration: [Debug, Release]

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Setup .NET 11
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 11.0.x
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore -c ${{ matrix.configuration }}
      - name: Test
        run: dotnet test --verbosity normal
      - name: Test AOT
        run: dotnet test --verbosity normal -p:RunAotTest=true

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref =='refs/heads/develop')) || (startsWith(github.ref, 'refs/heads/feature/') && github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      id-token: write
      packages: write

    strategy:
      matrix:
        runtime: ['any', '', 'win-x64', 'win-arm64', 'linux-x64', 'linux-arm64', 'osx-x64', 'osx-arm64']

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Setup .NET 11
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 11.0.x
          
      - name: Restore dependencies
        run: dotnet restore
      - name: Pack project
        run: dotnet pack --configuration Release --output ./nupkgs /p:RuntimeIdentifier=${{ matrix.runtime }} /p:Version=${{ steps.gitversion.outputs.semVer }}
      - name: Push to GitHub Packages
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --skip-duplicate
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}
      - name: Push to NuGet.org (Trusted Publishing)
        if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/dev/')) || (startsWith(github.ref, 'refs/heads/feature/') && github.event_name == 'workflow_dispatch')
        run: dotnet nuget push ./nupkgs/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{steps.login.outputs.NUGET_API_KEY}} --skip-duplicate
