next-version: 2.0.1

mode: ContinuousDelivery

branches:
  main:
    regex: ^main$
    label: ''
    increment: Patch
    is-release-branch: true
    source-branches:
      - develop
    prevent-increment:
      of-merged-branch: true

  develop:
    regex: ^develop$
    label: alpha
    increment: Minor
    is-main-branch: true
    track-merge-target: true
    source-branches:
      - main

  feature:
    regex: ^feature[/-]
    label: '{BranchName}'
    increment: Inherit
    source-branches:
      - develop

ignore:
  sha: []